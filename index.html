<body style="font-family: Arial; padding: 20px;">

    <h2>Create Planet Site</h2>

    <label>Server IP / Domain</label><br>
    <input id="server" style="width:400px;" placeholder="1.1.1.1 or https://lavahill.github.io/tgwwwexample/" />
    <br><br>

    <label>Planet Domain</label><br>
    <input id="domain" style="width:400px;" placeholder="mysite.ending" />
    <br>
    <small> any end level domains are allowed on Planetarium, .com .dingle .bruh anything! But if someone owns that domain already, you cant use it.</small>
    <br><br>

    <button onclick="create()">Create Site</button>

    <p id="status"></p>

    <script>
        async function create() {
            const server = document.getElementById("server").value;
            const domain = document.getElementById("domain").value;

            const res = await fetch(`https://hosting.lava-hill.com/api/sitecreate?server=${encodeURIComponent(server)}&domain=${encodeURIComponent(domain)}`);
            document.getElementById("status").innerText = await res.text();
        }
    </script>

</body>
